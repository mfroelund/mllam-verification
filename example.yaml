schema_version: v0.1.0

inputs:
  datasets:
    reference:
      path: /path/to/reference.zarr
    predictions:
      - path: /path/to/prediction1.zarr
      - path: /path/to/prediction2.zarr
  variables:
    - 2t
    - 10u
  coord_ranges:
    time:
      start: 1990-09-03T00:00
      end: 1990-09-09T00:00
      step: PT3H

methods:
  - object: mllam_verification.operations.statistics.calculate_global_error
    name: global_error
    include_persistence: true
  - object: mllam_verification.operations.statistics.calculate_error_per_gridpoint
    name: error_per_gridpoint
    include_persistence: true

output:
  path: /home/maf/ml/mllam/test_output