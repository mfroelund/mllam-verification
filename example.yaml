schema_version: v0.1.0

inputs:
  datasets:
    reference:
      path: /path/to/reference.zarr
    predictions:
      - prediction1:
        path: /path/to/prediction1.zarr
      - prediction2:
        path: /path/to/prediction2.zarr
  variables:
    - 2t
    - 10u
  coord_ranges:
    time:
      start: 1990-09-03T00:00
      end: 1990-09-09T00:00
      step: PT3H

methods:
  - global_persistence
  - gridpoint_persistence

output:
  path: /path/to/output/directory